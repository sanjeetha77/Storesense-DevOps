name: Storesense CI
on:
    push:
        branches:
            - main
jobs:
    build-frontend:
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: frontend
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
            - name: Setup node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22
            - name: Installing frontend dependencies
              run: npm ci
            - name: Building frontend dependencies
              run: npm run build
    build-backend:
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: backend
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
            - name: Setup python
              uses: actions/setup-python@v4
              with:
                python-version: '3.12'
            - name: Installing python dependencies
              run: pip install -r requirements.txt 
    docker-frontend:
        needs: build-frontend
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
            - name: Setup docker buildx
              uses: docker/setup-buildx-action@v3
            - name: Login to docker hub
              uses: docker/login-action@v3
              with:
                username: ${{ secrets.DOCKER_USERNAME }}
                password: ${{ secrets.DOCKER_TOKEN }}
            - name: build docker action
              uses: docker/build-push-action@v6
              with:
                context: ./frontend
                file: ./frontend/Dockerfile
                push: true
                tags: ${{ secrets.DOCKER_USERNAME }}/storesense-frontend:latest
    docker-backend:
        needs: build-backend
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
            - name: Setup Docker buildx
              uses: docker/setup-buildx-action@v3
            - name: Login to docker hub
              uses: docker/login-action@v3
              with:
                username: ${{ secrets.DOCKER_USERNAME }}
                password: ${{ secrets.DOCKER_TOKEN }}
            - name: Build docker action
              uses: docker/build-push-action@v6
              with:
                context: ./backend
                file: ./backend/Dockerfile
                push: true
                tags: ${{ secrets.DOCKER_USERNAME }}/storesense-backend:latest
    deploy:
        needs:
            - docker-frontend
            - docker-backend
        runs-on: ubuntu-latest
        steps:
            - name: Login to AWS EC2
              uses: appleboy/ssh-action@v1.2.0
              with:
                host: ${{ secrets.EC2_HOST}}
                username: ${{secrets.EC2_USERNAME}}
                key: ${{secrets.EC2_SSH_KEY}}
                script: |
                    cd ~/storesense
                    docker compose pull
                    docker compose up -d --remove-orphans
                    docker image prune -f