name: Storesense CI
on:
    push:
        branches:
            - main
jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - name: Steup node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22
            - name: Installing frontend dependencies
              run: npm ci
              working-directory: frontend
            - name: Building frontend dependencies
              run: npm run build
              working-directory: frontend